<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login menu [Fake netflix]</title>

<body>
    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="bg-black bg-opacity-75 text-light rounded-1 shadow p-4 d-grid gap-2" dir="rtl">
      

            <div class="mb-2">

                <div class="fs-1 text-end">
                    כניסה לחשבון

                </div>

            </div>

            <div class="mb-2">
                <input id="email-field" type="text" placeholder="אמייל או מספר נייד" class="menu-input form-control bg-transparent text-white">
            </div>
            
            <div class="mb-2">
                <input id = "password-field" type="password" placeholder="סיסמה" class="menu-input form-control bg-transparent text-white">
            </div>



            <div class = "d-grid gap-2 mt-2">

                <button id="login-button" class="btn btn-danger fw-bold" type="button">כניסה לחשבון</button>
                
                <div class = "text-center text-secondary">
                    או
                </div>
                    
                <button id = "get-code-button" class = "btn btn-secondary fw-bold" type="button">כניסה עם קוד</button>

                <div class = "text-center">
                    <a href="no_support.html" target="_self">שכחת את הסיסמה?</a>

                </div>
                    
            </div>

            <div class = "menu_item_info">
                <div class = "menu_item_checkbox">

                    <input type="checkbox" id="remember-me-checkbox">
                    <label for="remember-me-checkbox">
                        זכור אותי
                    </label>
                </div>


                <div class = "menu_item_invite_area">
                        עוד לא ב-Netflix?
                
                        <a href = "no_support.html" target = "_self">
                            <strong>זה הזמן להירשם.</strong>
                        </a>
                </div>
            
                    <div class = "menu_item_reCAPTCHA">
                        
            
                                    אתר זה מוגן על-ידי reCAPTCHA של Google.
                                <Strong>
                                    כדי לוודא 
                                </Strong>
                                <br>
                                    שהמשתמש אינו רובוט.
                            
                    <div class = "more_info_text">

                        <a href = "more-information.html" target = "_self">
                            לפרטים נוספים.
                        </a>
                    </div>
            </div>
                    
        </div>


    </div>
</body>
</html>
