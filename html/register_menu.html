<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    
</head>
<body>
    <div class="row w-100 justify-content-center min-vh-100 align-items-center m-0">
        
        <div class="menu-container w-auto bg-black bg-opacity-75 text-light rounded-1 shadow p-4 d-grid gap-2" dir="rtl">

            <div class="mb-2">
                <div class="fs-1 text-end">
                    הרשמה
                </div>
            </div>

            <div class="mb-2">
                <input id="mail-field" type="text" autocomplete="off" placeholder="אימייל" class="menu-input form-control bg-transparent text-white border-secondary text-end">
            </div>
            
            <div class="mb-2">
                <input id="phone-field" type="tel" autocomplete="off" placeholder="מספר נייד" class="menu-input form-control bg-transparent text-white border-secondary text-end">
            </div>
            
            <div class="mb-2">
                <input id="password-field" type="password" autocomplete="off" placeholder="סיסמה" class="menu-input form-control bg-transparent text-white border-secondary text-end">
            </div>
            
            <div class="mb-2">
                <input id="confirm-password-field" type="password" autocomplete="off" placeholder="אימות סיסמה" class="menu-input form-control bg-transparent text-white border-secondary text-end">
            </div>

            <div class="d-grid gap-2 mt-2">
                <button id="register-button" class="btn btn-danger fw-bold" type="button">רישום המשתמש</button>
            </div>

            <div class="menu_item_info">
                <div class="small text-secondary">
                    אם אתה כבר רשום ל-Netflix?
                    <a id="login-link" href="login_menu.html" target="_self" class="link-light fw-bold text-decoration-none">
                      זה הזמן להתחבר.
                    </a>
                </div>
            
                <div class="text-secondary" style="font-size: 10px;">
                    אתר זה מוגן על-ידי reCAPTCHA של Google.
                    <strong>כדי לוודא</strong>
                    <br>
                    שהמשתמש אינו רובוט.
                    <div class="mt-1" style="font-size: 14px;">
                      <a id="more-info-link" href="more-information.html" target="_self" class="link-primary text-decoration-none">
                        לפרטים נוספים.
                      </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="../js/register_menu_script.js"></script>

</body>
</html>
