<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/profiles_styles.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <div class="menu-container bg-black bg-opacity-50 p-5 shadow-lg text-center">
        <div class="menu">
            
            <div class="menu_title display-3 fw-bold text-white mb-5">
                Who's watching?
            </div>
            <div id = "msg_box">
            </div>

            <div id = "profiles" class="d-flex flex-wrap justify-content-center gap-4">

            </div>

            <div class="mt-5">
                <button type="button" id="remove-profile-button" class="profiles_menu_buttons btn btn-outline-secondary rounded-0 px-5 text-uppercase fw-bold mb-3 mb-md-0">
                    remove profile
                </button>
                <button type="button" id="manage-profile-button" class="profiles_menu_buttons btn btn-outline-secondary rounded-0 px-5 text-uppercase fw-bold mb-3 mb-md-0">
                    Manage Profiles
                </button>
                <button type="button" id="add-profile-button" class="profiles_menu_buttons btn btn-outline-secondary rounded-0 px-5 text-uppercase fw-bold mb-3 mb-md-0">
                    Add new profile
                </button>
            </div>

        </div>
    </div>

    <script src="../js/ui-utils.js"></script>
    <script src="../js/profiles_script.js"></script>
</body>
</html>
