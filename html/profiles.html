<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/profiles_styles.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center">

    <div class="menu-container bg-black bg-opacity-50 p-5 shadow-lg text-center">
        <div class="menu">
            
            <div class="menu_title display-3 fw-bold text-white mb-5">
                Who's watching?
            </div>

            <div class="profiles d-flex flex-wrap justify-content-center gap-4">

                <div class="profile">
                    <a href="profiles/profile1.html" class="text-decoration-none d-block">
                        <div class="profile_image">
                            <img src="../assets/profile1.png" alt="Paul" class="img-fluid border border-3 border-dark">
                        </div>
                        <div class="profile_name mt-3 text-secondary">
                            Paul
                        </div>
                    </a>
                </div>

                <div class="profile">
                    <a href="profiles/profile2.html" class="text-decoration-none d-block">
                        <div class="profile_image">
                            <img src="../assets/profile2.png" alt="Alon" class="img-fluid border border-3 border-dark">
                        </div>
                        <div class="profile_name mt-3 text-secondary">
                            Alon
                        </div>
                    </a>
                </div>

                <div class="profile">
                    <a href="profiles/profile3.html" class="text-decoration-none d-block">
                        <div class="profile_image">
                            <img src="../assets/profile3.png" alt="Ronni" class="img-fluid border border-3 border-dark">
                        </div>
                        <div class="profile_name mt-3 text-secondary">
                            Ronni
                        </div>
                    </a>
                </div>

                <div class="profile">
                    <a href="profiles/profile4.html" class="text-decoration-none d-block">
                        <div class="profile_image">
                            <img src="../assets/profile4.png" alt="Anna" class="img-fluid border border-3 border-dark">
                        </div>
                        <div class="profile_name mt-3 text-secondary">
                            Anna
                        </div>
                    </a>
                </div>

                <div class="profile">
                    <a href="profiles/profile5.html" class="text-decoration-none d-block">
                        <div class="profile_image">
                            <img src="../assets/profile5.png" alt="Noa" class="img-fluid border border-3 border-dark">
                        </div>
                        <div class="profile_name mt-3 text-secondary">
                            Noa
                        </div>
                    </a>
                </div>

            </div>

            <div class="mt-5">
                <button type="button" id="manage-profile-button" class="btn btn-outline-secondary rounded-0 px-5 text-uppercase fw-bold">
                    Manage Profiles
                </button>
            </div>

        </div>
    </div>
    
    <script src="../js/ui-utils.js"></script>
</body>
</html>
