<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טוען...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="row w-100 justify-content-center min-vh-100 align-items-center">
    <div class="menu-container w-auto bg-black bg-opacity-75 text-light rounded-1 shadow p-4 d-grid gap-2" dir="rtl">

      <div class="fs-1 text-end">
        אימות נתונים.

      </div>

      <div id="msg_box" class="">
      </div>

      <button id="fake-button" class="btn btn-danger fw-bold" type="button">Loading</button>

    </div>
  </div>

    <script type="module">
        import { ClientSessionManager } from './js/clientSessionManager.js';
        import * as UI from './js/ui-utils.js';
        const FAKE_BTN = document.getElementById("fake-button");
        (async () => 
        {
            UI.LockUI(FAKE_BTN);
            UI.ShowMessage("מבצע חיפוש אחר פרטי התחברות...");
            await new Promise(resolve => setTimeout(resolve, 2000));//to simulate reading cockies
            let newUrl = "html/login_menu.html"; 

            try 
            {
                const activeUser = await ClientSessionManager.restoreActiveSession();
                
                if (activeUser) 
                {
                    UI.ShowMessage("זוהה פרטי התחברות , מתבצעת העברה...");
                    newUrl = "html/profiles.html";
                }
                else 
                {
                    UI.ShowMessage("לא זוהו פרטי התחברות, הנך מועבר לדף ההתחברות...");
                    newUrl = "html/login_menu.html";
                }
            }
            catch (error) 
            {
                console.error("ERROR: ", error);
                newUrl = "html/login_menu.html";
            }

            setTimeout(() => 
            {
                UI.GoToLink(newUrl);
            }, 2000);
        })();
    </script>
</body>
</html>
