<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/browse.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="container-fluid menu-container page-admin">

    <!-- ============ Header: full-width mode selector + message box ============ -->
    <div class="container-fluid px-0">
        <div class="row g-0 my-0">
            <div id="mode_selector_container" class="col-12">
            </div>
        </div>
    </div>

    <!-- ============ Selection counter + message box ============ -->
    <div class="container-fluid d-flex flex-column flex-grow-1 overflow-hidden m-2 justify-content-center align-items-center">
         <div id="msg_box" class="col-6 col-md-3 text-center text-light fw-bold fs-5"></div>
         <div id="selection_counter" class="col-4 col-md-2 text-center text-light fw-bold fs-5"></div>
    </div>


    <div class="container-fluid d-flex flex-column flex-grow-1 overflow-hidden m-2">
        <div class="row flex-column flex-md-row flex-grow-1 overflow-hidden">

            <div class="col-12 col-md-3 order-1 order-md-2 d-flex flex-column flex-grow-1 overflow-auto">
                <div id="selection_container"
                     class="row row-cols-1 g-2 flex-grow-1 overflow-auto text-center rounded border border-secondary bg-black bg-opacity-50 p-2">
                </div>
            </div>

            <div class="col-12 col-md-9 order-2 order-md-1 d-flex flex-column flex-grow-1 overflow-hidden">
                <div id="view_container"
                     class="d-grid flex-grow-1 overflow-auto align-items-center text-center rounded border border-secondary bg-black bg-opacity-50">
                </div>
            </div>

        </div>

        <!-- ============ Action buttons ============ -->
        <div class="row my-2 flex-shrink-0">
            <div id="controll_container" class="d-flex justify-content-evenly align-items-center overflow-auto">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin.js"></script>
</body>
</html>
