<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="row w-100 justify-content-center min-vh-100 align-items-center m-0">
        
        <div class="menu-container w-auto bg-black bg-opacity-75 text-light rounded-4 shadow pb-4 d-grid gap-2" dir="rtl">

            <div class="mb-2">
                <div class="fs-1 text-end">הרשמה</div>
            </div>

            <div id="msg_box"></div>

            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="full-name-field" class="form-label w-25 text-end">שם מלא:</label>
                <input id="full-name-field" type="text" autocomplete="off" class="form-control bg-transparent text-white border-secondary">
            </div>

            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="birthday-field" class="form-label w-25 text-end">תאריך לידה:</label>
                <input id="birthday-field" type="date" class="form-control bg-transparent text-white border-secondary w-50 ms-auto me-auto">
            </div>

            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="mail-field" class="form-label w-25 text-end">אימייל:</label>
                <input id="mail-field" type="email" autocomplete="email" class="form-control bg-transparent text-white border-secondary">
            </div>
            
            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="phone-field" class="form-label w-25 text-end">מספר נייד:</label>
                <input id="phone-field" type="tel" autocomplete="tel" class="form-control bg-transparent text-white border-secondary">
            </div>
            
            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="password-field" class="form-label w-25 text-end">סיסמה:</label>
                <input id="password-field" type="password" autocomplete="new-password" class="form-control bg-transparent text-white border-secondary">
            </div>
            
            <div class="mb-2 d-flex justify-content-between align-items-center">
                <label for="confirm-password-field" class="form-label w-25 text-end">אימות סיסמה:</label>
                <input id="confirm-password-field" type="password" autocomplete="new-password" class="form-control bg-transparent text-white border-secondary">
            </div>

            <div class="d-grid gap-2 mt-2">
                <button id="register-button" class="btn btn-danger fw-bold" type="button">רישום המשתמש</button>
            </div>

            <div class="menu_item_info">
                <div class="small text-secondary">
                    אם אתה כבר רשום ל-Netflix?
                    <a id="login-link" href="login_menu.html" target="_self" class="link-light fw-bold text-decoration-none">זה הזמן להתחבר.</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/register_menu_script.js"></script>
</body>
</html>
