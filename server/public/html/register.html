<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up [Fake Netflix]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
</head>
<body class="page-auth">
    <div id="auth_root"></div>

    <script type="module">
        import { renderAuthCard } from '../js/ui.js';

        renderAuthCard(document.getElementById('auth_root'), {}, `
            <div class="mb-2">

                <div class="fs-1 text-start">
                    Sign Up

                </div>
            </div>

            
            <div id="msg_box" class="">
            </div>
            
            <div class="mb-2">
                <input id="full-name-field" type="text" autocomplete="off" placeholder="Full name" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>

            <div class="mb-2">
                <input id="birthday-field" type="date" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>

            <div class="mb-2">
                <input id="mail-field" type="email" autocomplete="email" placeholder="Email" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>
            
            <div class="mb-2">
                <input id="phone-field" type="tel" autocomplete="tel" placeholder="Phone number" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>
            
            <div class="mb-2">
                <input id="password-field" type="password" autocomplete="new-password" placeholder="Password" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>
            
            <div class="mb-2">
                <input id="confirm-password-field" type="password" autocomplete="new-password" placeholder="Confirm password" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>

            <div class="d-grid gap-2 mt-2">
                <button id="register-button" class="btn btn-danger fw-bold" type="button">Sign Up</button>
            </div>

            <div class="menu_item_info">
                <div class="small text-secondary">
                    Already have a Netflix account?
                    <a id="login-link" href="login.html" target="_self" class="link-light fw-bold text-decoration-none">Sign in now.</a>
                </div>
            </div>
        `);
    </script>

    <script type="module" src="../js/register.js"></script>
</body>
</html>
