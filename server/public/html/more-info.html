<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me [Fake netflix]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
</head>
<body class="bg-black text-light page-auth">

    <div id="auth_root"></div>

    <script type="module">
        import '../js/ui.js';
        import { renderAuthCard } from '../js/ui.js';

        renderAuthCard(document.getElementById('auth_root'), {
            rowClasses: 'row w-100 justify-content-center min-vh-100 align-items-center m-0'
        }, `
                <div class="mb-2">
                    <div class="fs-1 text-end">
                        פרטים נוספים
                    </div>
                </div>

                <div class="mb-1 text-end">
                    <span class="text-secondary small">שם היוצר:</span>
                    <div class="fs-2 fw-bold text-warning">שלומי גנון</div>
                </div>
                
                <div class="mb-3 text-end">
                    <span class="text-secondary small">שם הקורס:</span>
                    <div class="fs-2 fw-bold text-warning">פיתוח בסביבת אינטרנט</div>
                </div>
                
                <ul class="custom-list">
                    <li class="fw-bold text-primary mb-3">המערכת כוללת תהליכי התחברות והרשמה מלאים (יש להירשם כדי להתחבר).</li>
                    <li class="fw-bold text-primary mb-3">לחיצה על מדיה תוסיף אותה אוטומטית לרשימת "נצפו לאחרונה".</li>
                    <li class="fw-bold text-primary mb-3">ניתן ליצור פרופילים חדשים ולמחוק פרופילים קיימים.</li>
                    <li class="fw-bold text-primary mb-3">כל פרופיל יכול לסמן "אהבתי" על המדיה בנפרד.</li>
                    <li class="fw-bold text-primary mb-3">על מנת לראות את כל המדיה יש לחפש ללא קלט אחרת תוצג רק המדיה שמכילה את הקלט לחיפוש</li>
                </ul>

                <div class="d-grid gap-2 mt-2">
                    <a href="login.html" class="btn btn-danger fw-bold text-decoration-none text-center">תפריט התחברות</a>
                    
                    <div class="text-center text-secondary">
                        או
                    </div>
                    
                    <a href="register.html" class="btn btn-secondary fw-bold text-decoration-none text-center">תפריט הרשמה</a>
                </div>
        `);
    </script>
</body>
</html>
