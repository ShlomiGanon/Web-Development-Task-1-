<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About [Fake Netflix]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
</head>
<body class="bg-black text-light page-auth overflow-hidden">

    <div id="auth_root"></div>

    <script type="module">
        import { renderAuthCard } from '../js/ui.js';

        renderAuthCard(document.getElementById('auth_root'), {
            rowClasses: 'row w-100 justify-content-center min-vh-100 align-items-center m-0',
            extraCardClasses: 'col-11 col-md-10 col-lg-8 menu-scrollable'
        }, `
                <div class="flex-shrink-0">
                    <div class="mb-2">
                        <div class="fs-1 text-start">
                            More Info
                        </div>
                    </div>

                    <div class="mb-1 text-start">
                        <span class="text-secondary small">Creator:</span>
                        <div class="fs-2 fw-bold text-warning">Shlomi Ganon</div>
                    </div>

                    <div class="mb-2 text-start">
                        <span class="text-secondary small">Course:</span>
                        <div class="fs-2 fw-bold text-warning">Web Development</div>
                    </div>
                </div>

                <div class="menu-body text-start">
                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">How to use the site</div>
                        <p class="text-secondary mb-0">
                            Open the site → Sign Up / Sign In → Pick a profile → Browse and watch
                            <br>
                            (Users with permission can also open the admin dashboard from the profiles screen)
                        </p>
                    </div>

                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">Sign In and Sign Up</div>
                        <ul class="custom-list mb-0">
                            <li class="fw-bold text-primary mb-2">Full sign-up and sign-in flow (you must register before you can sign in).</li>
                            <li class="fw-bold text-primary mb-2">The client checks the form fields before sending them to the server.</li>
                            <li class="fw-bold text-primary mb-2">You can turn on "Remember me" to stay signed in longer.</li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">Profiles</div>
                        <ul class="custom-list mb-0">
                            <li class="fw-bold text-primary mb-2">Netflix-style "Who's Watching?" screen to pick a profile.</li>
                            <li class="fw-bold text-primary mb-2">You can create, edit, and delete profiles.</li>
                            <li class="fw-bold text-primary mb-2">Each profile can have a name, age, and avatar.</li>
                            <li class="fw-bold text-primary mb-2">From the profiles screen you can update account details or sign out.</li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">Browse and watch</div>
                        <ul class="custom-list mb-0">
                            <li class="fw-bold text-primary mb-2">Browse by category: Home, TV Shows, Movies, New &amp; Popular, My List.</li>
                            <li class="fw-bold text-primary mb-2">Click a title to see more details and play it.</li>
                            <li class="fw-bold text-primary mb-2">Opening a title adds it to "Last watched" automatically.</li>
                            <li class="fw-bold text-primary mb-2">Watch progress is saved, and there is a Continue Watching button for the latest title.</li>
                            <li class="fw-bold text-primary mb-2">Each profile can like titles on its own.</li>
                            <li class="fw-bold text-primary mb-2">You can write, edit, and delete episode reviews.</li>
                            <li class="fw-bold text-primary mb-2">Home shows recommendations based on other profiles on the same account.</li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">Admin dashboard</div>
                        <ul class="custom-list mb-0">
                            <li class="fw-bold text-primary mb-2">Available to users with the right permission from the profiles screen.</li>
                            <li class="fw-bold text-primary mb-2">Manage users, content, episodes, and reviews.</li>
                            <li class="fw-bold text-primary mb-2">View visual statistics about system activity.</li>
                        </ul>
                    </div>

                    <div class="mb-3">
                        <div class="fs-4 fw-bold text-danger mb-2">Helpful tips</div>
                        <ul class="custom-list mb-0">
                            <li class="fw-bold text-primary mb-2">Search with an empty query to see all titles in the current filter; otherwise only matching titles are shown.</li>
                            <li class="fw-bold text-primary mb-2">"My List" shows what this profile watched recently.</li>
                            <li class="fw-bold text-primary mb-2">Switch profiles from the browse page menu.</li>
                        </ul>
                    </div>
                </div>

                <div class="d-grid gap-2 mt-2 flex-shrink-0">
                    <a href="login.html" class="btn btn-danger fw-bold text-decoration-none text-center">Sign In</a>

                    <div class="text-center text-secondary">
                        OR
                    </div>

                    <a href="register.html" class="btn btn-secondary fw-bold text-decoration-none text-center">Sign Up</a>
                </div>
        `);
    </script>
</body>
</html>
