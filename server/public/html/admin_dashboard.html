<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/nav_styles.css">
    <link rel="stylesheet" href="../css/out_source.css">
    <link rel="stylesheet" href="../css/bubble.css">
    <link rel="stylesheet" href="../css/admin_dash.css">
    <title>Admin Dashboard</title>
</head>
<body class="d-flex flex-column" style="min-height: 100dvh;">

    <!-- ============ Header: mode selector + message box ============ -->
    <div class="container-fluid flex-shrink-0">
        <div class="row g-2 my-2 justify-content-center align-items-center">

            <div id="mode_selector_container"
                 class="col-12 col-md-9 d-flex justify-content-evenly align-items-center rounded">
            </div>

            <div id="msg_box"
                 class="col-12 col-md-3 d-flex justify-content-center align-items-center text-center fw-bold fs-5 rounded bg-danger bg-opacity-50">
            </div>

        </div>
    </div>

    <!-- ============ Selection counter ============ -->
    <div id="selection_counter" class="flex-shrink-0"></div>

    <!-- ============ Main content: selection list + detail view ============ -->
    <div class="container d-flex flex-column flex-grow-1 overflow-hidden">

        <div class="row flex-column flex-md-row flex-grow-1 overflow-hidden">

            <div class="col-12 col-md-3 order-1 order-md-2 d-flex flex-column flex-grow-1 overflow-auto">
                <div id="selection_container"
                     class="d-grid flex-grow-1 overflow-auto text-center rounded border border-secondary bg-light bg-opacity-50">
                    <h1>Selection Container</h1>
                </div>
            </div>

            <div class="col-12 col-md-9 order-2 order-md-1 d-flex flex-column flex-grow-1 overflow-hidden">
                <div id="view_container"
                     class="d-grid flex-grow-1 overflow-auto align-items-center text-center rounded border border-secondary bg-dark bg-opacity-50">
                    <h1>View Container</h1>
                </div>
            </div>

        </div>

        <!-- ============ Action buttons ============ -->
        <div class="row my-2 flex-shrink-0">
            <div id="controll_container" class="d-flex justify-content-evenly align-items-center overflow-auto">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
