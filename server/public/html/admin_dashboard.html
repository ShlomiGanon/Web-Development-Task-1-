<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/nav_styles.css">
    <link rel="stylesheet" href="../css/out_source.css">
    <link rel="stylesheet" href="../css/bubble.css">
    <link rel="stylesheet" href="../css/admin_dash.css">
    <title>Admin Dashboard</title>
</head>
<body class="">

    <div class="container-fluid row d-flex justify-content-center align-items-center my-1">

        <div id="mode_selector_container" class="col-md-9 col-sm-12 bg-opacity-50 rounded d-flex justify-content-evenly align-items-center my-2">
            </div>

        <div id="msg_box" class="col-md-3 col-sm-12 bg-dark bg-opacity-50 rounded d-flex justify-content-center align-items-center text-center fw-bold fs-5">
            </div>

    </div>

    <div class="container-fluid">

        <div class="row d-flex justify-content-evenly align-items-stretch">
            <div class="col-md-3 col-sm-12 order-md-2 order-1">
                <div class="h-100 w-100 position-relative d-flex flex-column">
                    <div id="selection_counter" class="text-center text-light fw-bold fs-5 bg-dark position-relative w-100">
                        Selection Counter: [#]
                    </div>
                    <div id="selection_container" class="d-grid overflow-y-auto overflow-x-hidden flex-grow-1 bg-light text-dark bg-opacity-50">
            
                    </div>
                </div>
            </div>
        
            <div class="col-md-9 col-sm-12 order-md-1 order-2">
                <div id="view_container" class="d-grid overflow-y-auto overflow-x-hidden rounded border border-secondary justify-content-evenly align-items-center text-center bg-dark text-light bg-opacity-50 h-100 w-100">
        
                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid row d-flex justify-content-center align-items-center m-auto">
        <div id="controll_container" class="col-md-9 col-sm-12 bg-opacity-50 rounded">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
