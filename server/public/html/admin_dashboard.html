<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/nav_styles.css">
    <link rel="stylesheet" href="../css/out_source.css">
    <link rel="stylesheet" href="../css/bubble.css">
    <link rel="stylesheet" href="../css/admin_dash.css">
    <title>Admin Dashboard</title>
</head>
<body class="">

    <div class="container-fluid p-3 row d-flex justify-content-center align-items-center my-2">
    
        <div id="mode_selector_container" class="col-md-9 col-sm-12 bg-opacity-50 rounded d-flex justify-content-evenly align-items-center mb-2">
            </div>
    
        <div id="msg_box" class="col-md-3 col-sm-12 bg-danger bg-opacity-50 rounded d-flex justify-content-center align-items-center text-center fw-bold fs-5">
            </div>
    
    </div>

    <div class="container">
    
        <div class="row h-100 col-12">
            <div class="col-md-3 col-sm-12 order-md-2 order-1">
                <div id="selection_container" class="d-grid overflow-auto rounded border border-secondary text-center bg-light bg-opacity-50">
                    <h1>Selection Container</h1>
                </div>
            </div>
        
            <div class="col-md-9 col-sm-12 order-md-1 order-2 ">
                <div id="view_container" class="d-grid align-items-center overflow-auto rounded border border-secondary text-center bg-dark bg-opacity-50">
                    <h1>View Container</h1>
                </div>
            </div>

        </div>
    
        <div class="container-fluid p-3 row d-flex justify-content-center align-items-center col-md-9 col-sm-12">
                <div id="controll_container" class="overflow-auto bg-opacity-50 rounded d-flex justify-content-evenly align-items-center mb-2">
                    </div>
        </div>
    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
