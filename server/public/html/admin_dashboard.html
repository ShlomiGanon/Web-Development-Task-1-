<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/nav_styles.css">
    <link rel="stylesheet" href="../css/out_source.css">
    <link rel="stylesheet" href="../css/bubble.css">
    <link rel="stylesheet" href="../css/admin_dash.css">
    <title>Admin Dashboard</title>
</head>
<body class="d-flex flex-column vh-100">

    <div class="container-fluid flex-shrink-0">
        <div class="row d-flex justify-content-center align-items-center my-1 g-2">

            <div id="mode_selector_container" class="col-12 col-md-9 bg-opacity-50 rounded d-flex flex-wrap justify-content-evenly align-items-center gap-2 py-2">
            </div>

            <div id="msg_box" class="col-12 col-md-3 bg-dark bg-opacity-50 rounded d-flex justify-content-center align-items-center text-center fw-bold fs-5 py-3">
            </div>

        </div>
    </div>

    <div class="container-fluid flex-grow-1 overflow-hidden">
        <div class="row h-100 d-flex flex-column flex-md-row justify-content-evenly align-items-stretch g-2">

            <div class="col-12 col-md-3 order-2 order-md-2 h-100">
                <div class="h-100 w-100 d-flex flex-column">
                    <div id="selection_counter" class="text-center text-light fw-bold fs-5 bg-dark w-100 flex-shrink-0">
                        Selection Counter: [#]
                    </div>
                    <div id="selection_container" class="d-grid overflow-y-auto overflow-x-hidden flex-grow-1 bg-light text-dark bg-opacity-50">
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-9 order-1 order-md-1 h-100">
                <div id="view_container" class="d-grid overflow-y-auto overflow-x-hidden rounded border border-secondary justify-content-evenly align-items-center text-center bg-dark text-light bg-opacity-50 h-100 w-100">
                </div>
            </div>

        </div>
    </div>

    <div class="container-fluid flex-shrink-0">
        <div class="row justify-content-evenly align-items-center my-2">
            <div id="controll_container" class="col-12 bg-opacity-50 rounded overflow-x-auto d-flex flex-nowrap flex-md-wrap">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
