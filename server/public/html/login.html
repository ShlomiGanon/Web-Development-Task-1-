<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In [Fake Netflix]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/theme.css">
    <link rel="stylesheet" href="../css/base.css">
    
</head>
<body class="page-auth">
    <div id="auth_root"></div>

    <script type="module">
        import { renderAuthCard } from '../js/ui.js';

        renderAuthCard(document.getElementById('auth_root'), {}, `
            <div class="mb-2">

                <div class="fs-1 text-start">
                    Sign In

                </div>
            </div>

            
            <div id="msg_box" class="">
            </div>
            
            <div class="mb-2">
                <input id="email-or-phone-field" type="text" autocomplete="off" placeholder="Email or phone number" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>
            
            
            <div class="mb-2">
                <input id = "password-field" type="password" autocomplete="off" placeholder="Password" class="menu-input form-control bg-transparent text-white border-secondary text-start">
            </div>


            <div class = "d-grid gap-2 mt-2">

                <button id="login-button" class="btn btn-danger fw-bold" type="button">Sign In</button>
                
                <div class = "text-center text-secondary">
                    OR
                </div>
                    
                <button id = "get-code-button" class = "btn btn-secondary fw-bold" type="button">Use a sign-in code</button>

                <div class="text-start">
                    <button id="forgot-pass-button" type="button"
                            class="btn btn-link link-primary p-0 text-decoration-none">
                      Forgot password?
                    </button>
                </div>
                    
            </div>

            <div class = "menu_item_info">
                <div class="d-flex w-100 justify-content-start align-items-center gap-2">
                    <input class="form-check-input m-0" type="checkbox" id="remember-me-checkbox">
                    <label class="m-0" for="remember-me-checkbox">Remember me</label>
                </div>


                <div class="small text-secondary">
                    New to Netflix?
                    <a id = "register-link" href="register.html" target="_self" class="link-light fw-bold text-decoration-none">
                      Sign up now.
                    </a>
                </div>
            
                <div class="text-secondary" style="font-size: 10px;">
                    This site is protected by Google reCAPTCHA
                    <strong>to make sure</strong>
                    <br>
                    you are not a bot.
                    <div class="mt-1" style="font-size: 14px;">
                      <a id = "more-info-link" href="more-info.html" target="_self" class="link-primary text-decoration-none">
                        Learn more.
                      </a>
                    </div>
                </div>
            </div>
        `);
    </script>

    <script type="module" src="../js/login.js"></script>

</body>
</html>
