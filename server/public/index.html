<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/base.css">
</head>
<body class="page-auth">
  <div id="auth_root"></div>

    <script type="module">
        import { ClientSessionManager } from './js/core/session.js';
        import * as UI from './js/ui.js';
        import { renderAuthCard } from './js/ui.js';

        renderAuthCard(document.getElementById('auth_root'), {}, `
      <div class="fs-1 text-start">
        Checking your session...

      </div>

      <div id="msg_box" class="">
      </div>

      <button id="fake-button" class="btn btn-danger fw-bold" type="button">Loading</button>
        `);

        const FAKE_BTN = document.getElementById("fake-button");
        (async () => 
        {
            UI.lockUi(FAKE_BTN);
            UI.showMessage("Looking for saved sign-in details...");
            await new Promise(resolve => setTimeout(resolve, 2000));//to simulate reading cockies
            let newUrl = "html/login.html"; 
            try 
            {
                
                if (await ClientSessionManager.isLoggedIn()) 
                {
                    UI.showMessage("Signed in. Taking you to profiles...");
                    newUrl = "html/profiles.html";
                }
                else 
                {
                    UI.showMessage("No session found. Taking you to Sign In...");
                    newUrl = "html/login.html";
                }
            }
            catch (error) 
            {
                console.error("ERROR: ", error);
                newUrl = "html/login.html";
            }

            setTimeout(() => 
            {
                UI.goToLink(newUrl);
            }, 2000);
        })();
    </script>
</body>
</html>
